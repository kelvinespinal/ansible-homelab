---
- name: Gather System Debug Info
  hosts: all
  become: true
  serial: 1
  tasks:
    - name: Gather uptime
      ansible.builtin.command: uptime
      register: uptime
      changed_when: false

    - name: Gather memory
      ansible.builtin.command: free -h
      register: memory
      changed_when: false

    - name: Gather disk usage
      ansible.builtin.command: df -h
      register: diskusage
      changed_when: false

    - name: Gather failed services
      ansible.builtin.command: systemctl list-units --state=failed --no-legend
      register: failed_services
      changed_when: false

    - name: Gather top CPU processes
      ansible.builtin.command: ps -eo user,pid,pcpu,pmem,cmd --sort=-pcpu
      register: pscpu
      changed_when: false

    - name: Gather top memory processes
      ansible.builtin.command: ps -eo user,pid,pcpu,pmem,cmd --sort=-pmem
      register: pssize
      changed_when: false

    - name: Gather vmstat
      ansible.builtin.command: vmstat 1 5
      register: vmstat
      changed_when: false

    - name: "================================"
      ansible.builtin.debug:
        msg: "NODE: {{ inventory_hostname }}"

    - name: "---- Uptime & Load ----"
      ansible.builtin.debug:
        msg: "{{ uptime.stdout }}"

    - name: "---- Memory ----"
      ansible.builtin.debug:
        msg: "{{ item }}"
      loop: "{{ memory.stdout_lines }}"

    - name: "---- Disk Usage ----"
      ansible.builtin.debug:
        msg: "{{ item }}"
      loop: "{{ diskusage.stdout_lines }}"

    - name: "---- Failed Services ----"
      ansible.builtin.debug:
        msg: "{{ failed_services.stdout if failed_services.stdout else 'No failed services' }}"

    - name: "---- Top 5 CPU ----"
      ansible.builtin.debug:
        msg: "{{ item }}"
      loop: "{{ pscpu.stdout_lines[:6] }}"

    - name: "---- Top 5 Memory ----"
      ansible.builtin.debug:
        msg: "{{ item }}"
      loop: "{{ pssize.stdout_lines[:6] }}"

    - name: "---- VMStat ----"
      ansible.builtin.debug:
        msg: "{{ item }}"
      loop: "{{ vmstat.stdout_lines }}"