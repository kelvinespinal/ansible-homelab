---
- name: Remediate Flask Service
  hosts: workerb.home.lab
  gather_facts: false

  tasks:
    - name: Stop Flask container
      ansible.builtin.command:
        cmd: podman stop flask-app
      ignore_errors: true

    - name: Start Flask container
      ansible.builtin.command:
        cmd: podman start flask-app

    - name: Verify Flask is healthy
      ansible.builtin.uri:
        url: http://127.0.0.1:5000/health
        status_code: 200
      register: health_check
      retries: 5
      delay: 5
      until: health_check.status == 200